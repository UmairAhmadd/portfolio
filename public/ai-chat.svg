<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11141a"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="avatar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect width="800" height="320" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="52" fill="#161a22"/>
  <rect x="0" y="51" width="800" height="1" fill="#262c38"/>
  <circle cx="36" cy="26" r="16" fill="url(#avatar)"/>
  <circle cx="36" cy="22" r="2.6" fill="#fff" opacity="0.9"/>
  <path d="M30 31 a6 6 0 0 1 12 0" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <text x="62" y="23" fill="#f3f4f6" font-size="16" font-weight="600">AI Assistant</text>
  <circle cx="66" cy="36" r="3.4" fill="#22c55e"/>
  <text x="76" y="40" fill="#9aa3b2" font-size="12">Online</text>
  <circle cx="752" cy="26" r="2.4" fill="#6b7280"/>
  <circle cx="763" cy="26" r="2.4" fill="#6b7280"/>
  <circle cx="774" cy="26" r="2.4" fill="#6b7280"/>

  <!-- AI message 1 -->
  <rect x="24" y="66" width="300" height="36" rx="16" fill="#222834"/>
  <rect x="24" y="94" width="16" height="12" rx="4" fill="#222834"/>
  <text x="42" y="89" fill="#e5e7eb" font-size="14">How can I help you today?</text>

  <!-- User message -->
  <rect x="476" y="112" width="300" height="36" rx="16" fill="url(#accent)"/>
  <rect x="760" y="140" width="16" height="12" rx="4" fill="#4f46e5"/>
  <text x="494" y="135" fill="#ffffff" font-size="14">Write a haiku about the sea</text>

  <!-- AI message 2 -->
  <rect x="24" y="158" width="340" height="82" rx="16" fill="#222834"/>
  <rect x="24" y="232" width="16" height="12" rx="4" fill="#222834"/>
  <text x="42" y="182" fill="#e5e7eb" font-size="14">Waves whisper softly,</text>
  <text x="42" y="202" fill="#e5e7eb" font-size="14">moonlight drifts on endless tides —</text>
  <text x="42" y="222" fill="#e5e7eb" font-size="14">the deep breathes in blue.</text>

  <!-- Input bar -->
  <rect x="0" y="268" width="800" height="52" fill="#11141a"/>
  <rect x="0" y="268" width="800" height="1" fill="#262c38"/>
  <rect x="24" y="280" width="690" height="32" rx="16" fill="#1b212c" stroke="#2b3340" stroke-width="1"/>
  <text x="42" y="300" fill="#6b7280" font-size="14">Type a message...</text>
  <circle cx="748" cy="296" r="20" fill="url(#accent)"/>
  <path d="M739 296 l18 0 M750 289 l7 7 l-7 7" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
