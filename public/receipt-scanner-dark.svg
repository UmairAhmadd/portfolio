<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2440"/>
      <stop offset="1" stop-color="#0d1322"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="blueV" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="phoneShadow" x="-40%" y="-30%" width="180%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="320" fill="#0A0A0F"/>
  <ellipse cx="400" cy="300" rx="320" ry="40" fill="#000000" opacity="0.5"/>
  <circle cx="400" cy="150" r="180" fill="#152038" opacity="0.35"/>

  <!-- ===================== PHONE 1 (left) — Onboarding ===================== -->
  <g transform="translate(196,52)" filter="url(#phoneShadow)">
    <rect x="0" y="0" width="120" height="228" rx="22" fill="url(#frame)"/>
    <rect x="6" y="6" width="108" height="216" rx="16" fill="#0b1020"/>
    <!-- status bar -->
    <text x="15" y="19" fill="#e2e8f0" font-size="7" font-weight="600">9:41</text>
    <path d="M89 17 q5 -5 10 0" stroke="#cbd5e1" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <circle cx="94" cy="18" r="1" fill="#cbd5e1"/>
    <rect x="100" y="13" width="11" height="6" rx="1.5" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="101" y="14" width="7" height="4" rx="0.5" fill="#cbd5e1"/>
    <rect x="111.5" y="14.5" width="1.5" height="3" rx="0.5" fill="#cbd5e1"/>
    <!-- receipt photo -->
    <g transform="rotate(-6 60 58)">
      <rect x="38" y="32" width="44" height="52" rx="4" fill="#eef2f8"/>
      <rect x="44" y="40" width="32" height="3" rx="1.5" fill="#2563EB"/>
      <rect x="44" y="48" width="28" height="2" rx="1" fill="#cbd5e1"/>
      <rect x="44" y="54" width="32" height="2" rx="1" fill="#cbd5e1"/>
      <rect x="44" y="60" width="22" height="2" rx="1" fill="#cbd5e1"/>
      <rect x="44" y="70" width="32" height="3" rx="1.5" fill="#1f2937"/>
    </g>
    <!-- heading -->
    <text x="60" y="108" text-anchor="middle" fill="#f8fafc" font-size="8.5" font-weight="700">Scan &amp; Save</text>
    <text x="60" y="121" text-anchor="middle" fill="#f8fafc" font-size="8.5" font-weight="700">Receipts Instantly</text>
    <text x="60" y="137" text-anchor="middle" fill="#94a3b8" font-size="6">Fast OCR receipt capture</text>
    <!-- pagination dots -->
    <rect x="50" y="158" width="10" height="3" rx="1.5" fill="#2563EB"/>
    <circle cx="66" cy="159.5" r="1.6" fill="#475569"/>
    <circle cx="72" cy="159.5" r="1.6" fill="#475569"/>
    <!-- buttons -->
    <text x="20" y="207" fill="#94a3b8" font-size="7" font-weight="600">Skip</text>
    <rect x="64" y="197" width="42" height="18" rx="9" fill="url(#blue)"/>
    <text x="85" y="209" text-anchor="middle" fill="#ffffff" font-size="7" font-weight="600">Next</text>
  </g>

  <!-- ===================== PHONE 3 (right) — Analytics ===================== -->
  <g transform="translate(484,52)" filter="url(#phoneShadow)">
    <rect x="0" y="0" width="120" height="228" rx="22" fill="url(#frame)"/>
    <rect x="6" y="6" width="108" height="216" rx="16" fill="#0b1020"/>
    <!-- status bar -->
    <text x="15" y="19" fill="#e2e8f0" font-size="7" font-weight="600">9:41</text>
    <path d="M89 17 q5 -5 10 0" stroke="#cbd5e1" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <circle cx="94" cy="18" r="1" fill="#cbd5e1"/>
    <rect x="100" y="13" width="11" height="6" rx="1.5" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="101" y="14" width="7" height="4" rx="0.5" fill="#cbd5e1"/>
    <rect x="111.5" y="14.5" width="1.5" height="3" rx="0.5" fill="#cbd5e1"/>
    <!-- heading -->
    <text x="14" y="40" fill="#f8fafc" font-size="9" font-weight="700">Monthly</text>
    <text x="14" y="52" fill="#f8fafc" font-size="9" font-weight="700">Summary</text>
    <!-- mini chart card -->
    <rect x="12" y="60" width="96" height="38" rx="8" fill="#111a2c"/>
    <g fill="url(#blueV)">
      <rect x="20" y="78" width="9" height="14" rx="2"/>
      <rect x="36" y="70" width="9" height="22" rx="2"/>
      <rect x="52" y="74" width="9" height="18" rx="2"/>
      <rect x="68" y="66" width="9" height="26" rx="2"/>
      <rect x="84" y="72" width="9" height="20" rx="2"/>
    </g>
    <!-- categories -->
    <text x="14" y="116" fill="#94a3b8" font-size="6.5" letter-spacing="0.5">CATEGORIES</text>
    <circle cx="17" cy="127" r="3" fill="#2563EB"/>
    <rect x="25" y="125.5" width="42" height="3" rx="1.5" fill="#475569"/>
    <text x="106" y="130" text-anchor="end" fill="#cbd5e1" font-size="6.5" font-weight="600">45%</text>
    <circle cx="17" cy="143" r="3" fill="#34d399"/>
    <rect x="25" y="141.5" width="34" height="3" rx="1.5" fill="#475569"/>
    <text x="106" y="146" text-anchor="end" fill="#cbd5e1" font-size="6.5" font-weight="600">30%</text>
    <circle cx="17" cy="159" r="3" fill="#fbbf24"/>
    <rect x="25" y="157.5" width="28" height="3" rx="1.5" fill="#475569"/>
    <text x="106" y="162" text-anchor="end" fill="#cbd5e1" font-size="6.5" font-weight="600">25%</text>
    <!-- history -->
    <text x="14" y="182" fill="#94a3b8" font-size="6.5" letter-spacing="0.5">HISTORY</text>
    <rect x="12" y="188" width="96" height="16" rx="5" fill="#121a2c"/>
    <rect x="18" y="193" width="6" height="7" rx="1" fill="#2563EB"/>
    <rect x="29" y="194.5" width="30" height="3" rx="1.5" fill="#475569"/>
    <text x="103" y="199" text-anchor="end" fill="#94a3b8" font-size="6">12 Jun</text>
    <rect x="12" y="208" width="96" height="16" rx="5" fill="#121a2c"/>
    <rect x="18" y="213" width="6" height="7" rx="1" fill="#34d399"/>
    <rect x="29" y="214.5" width="24" height="3" rx="1.5" fill="#475569"/>
    <text x="103" y="219" text-anchor="end" fill="#94a3b8" font-size="6">10 Jun</text>
  </g>

  <!-- ===================== PHONE 2 (center, larger) — Dashboard ===================== -->
  <g transform="translate(324,16)" filter="url(#phoneShadow)">
    <rect x="0" y="0" width="152" height="288" rx="26" fill="url(#frame)"/>
    <rect x="7" y="7" width="138" height="274" rx="20" fill="#0b1020"/>
    <!-- status bar -->
    <text x="18" y="22" fill="#e2e8f0" font-size="7.5" font-weight="600">9:41</text>
    <path d="M114 20 q5.5 -5.5 11 0" stroke="#cbd5e1" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <circle cx="119.5" cy="21" r="1.1" fill="#cbd5e1"/>
    <rect x="127" y="16" width="12" height="7" rx="1.7" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="128" y="17" width="8" height="5" rx="0.6" fill="#cbd5e1"/>
    <rect x="139.5" y="17.5" width="1.6" height="4" rx="0.6" fill="#cbd5e1"/>
    <!-- greeting -->
    <text x="16" y="44" fill="#94a3b8" font-size="8">Hello,</text>
    <text x="16" y="61" fill="#f8fafc" font-size="16" font-weight="800">UMAIR</text>
    <!-- total expenses card -->
    <rect x="14" y="72" width="124" height="48" rx="12" fill="url(#blue)"/>
    <text x="24" y="91" fill="#dbeafe" font-size="6.5" letter-spacing="1">TOTAL EXPENSES</text>
    <text x="24" y="110" fill="#ffffff" font-size="16" font-weight="800">PKR 1.00</text>
    <circle cx="120" cy="88" r="9" fill="#ffffff" opacity="0.16"/>
    <!-- this month card -->
    <rect x="14" y="126" width="124" height="40" rx="11" fill="#131d33"/>
    <text x="24" y="143" fill="#94a3b8" font-size="6.5" letter-spacing="1">THIS MONTH</text>
    <text x="24" y="159" fill="#f8fafc" font-size="13" font-weight="700">PKR 1.00</text>
    <circle cx="120" cy="146" r="9" fill="#2563EB" opacity="0.25"/>
    <!-- recent scans -->
    <text x="16" y="186" fill="#cbd5e1" font-size="8" font-weight="700">Recent Scans</text>
    <rect x="14" y="192" width="124" height="22" rx="7" fill="#121a2c"/>
    <rect x="22" y="198" width="9" height="11" rx="1.5" fill="#2563EB"/>
    <rect x="38" y="200" width="46" height="3" rx="1.5" fill="#475569"/>
    <rect x="38" y="206" width="30" height="2.5" rx="1.25" fill="#334155"/>
    <text x="130" y="206" text-anchor="end" fill="#e2e8f0" font-size="7" font-weight="600">PKR 1</text>
    <rect x="14" y="218" width="124" height="22" rx="7" fill="#121a2c"/>
    <rect x="22" y="224" width="9" height="11" rx="1.5" fill="#34d399"/>
    <rect x="38" y="226" width="40" height="3" rx="1.5" fill="#475569"/>
    <rect x="38" y="232" width="26" height="2.5" rx="1.25" fill="#334155"/>
    <text x="130" y="232" text-anchor="end" fill="#e2e8f0" font-size="7" font-weight="600">PKR 1</text>
    <!-- bottom nav -->
    <rect x="7" y="250" width="138" height="31" rx="0" fill="#0c1322"/>
    <rect x="7" y="250" width="138" height="1" fill="#1e2940"/>
    <!-- home -->
    <path d="M28 268 l8 -7 l8 7 M30 266 v6 h12 v-6" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <text x="36" y="279" text-anchor="middle" fill="#64748b" font-size="5">Home</text>
    <!-- scan (center, highlighted) -->
    <circle cx="76" cy="263" r="14" fill="url(#blue)"/>
    <rect x="69" y="259" width="14" height="9" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="73" y="256" width="6" height="3" rx="1" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="76" cy="263.5" r="2.6" fill="#ffffff"/>
    <text x="76" y="282" text-anchor="middle" fill="#93c5fd" font-size="5">Scan</text>
    <!-- analytics -->
    <g stroke="#64748b" stroke-width="1.6" stroke-linecap="round">
      <line x1="113" y1="271" x2="113" y2="265"/>
      <line x1="118" y1="271" x2="118" y2="260"/>
      <line x1="123" y1="271" x2="123" y2="263"/>
    </g>
    <text x="118" y="279" text-anchor="middle" fill="#64748b" font-size="5">Analytics</text>
  </g>
</svg>
